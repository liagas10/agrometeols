<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRO METEO LS | Professional Edition</title>
    <style>
        :root {
            --primary: #00e5ff;
            --bg: #0a0c10;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* HEADER /
        header {
            text-align: left;
            padding: 20px;
            border-left: 4px solid var(--primary);
            background: var(--glass);
            margin-bottom: 30px;
            border-radius: 0 15px 15px 0;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .station-meta {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        / LIVE INDICATOR /
        .live-status {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        / GRID /
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .label {
            color: #888;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .value {
            font-size: 54px;
            font-weight: 200;
            margin-bottom: 10px;
        }

        .unit {
            font-size: 20px;
            color: var(--primary);
            margin-left: 5px;
        }

        / CHARTS /
        .chart-container {
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #fff; / Λευκό για να διαβάζεται το γράφημα του Thingspeak /
        }

        / SECONDARY STATS */
        .secondary-grid {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .small-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .small-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            color: #444;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AGRO METEO LS</h1>
        <div class="station-meta">ΠΑΛΑΙΟΣ ΜΥΛΟΤΟΠΟΣ | Ιδιοκτήτης: Χ. Τσαβαλακογλου</div>
    </header>

    <div class="live-status">
        <div class="pulse"></div>
        ΣΥΝΔΕΣΗ LIVE: <span id="last-update" style="margin-left: 5px;">---</span>
    </div>

    <div class="main-grid">
        <!-- TEMP -->
        <div class="card">
            <div class="label">Θερμοκρασία</div>
            <div class="value"><span id="val-temp">--</span><span class="unit">°C</span></div>
            <div class="chart-container">
                <iframe width="100%" height="200" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=15&color=%2300e5ff&background=%23ffffff"></iframe>
            </div>
        </div>

        <!-- HUM -->
        <div class="card">
            <div class="label">Υγρασία</div>
            <div class="value"><span id="val-hum">--</span><span class="unit">%</span></div>
            <div class="chart-container">
                <iframe width="100%" height="200" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/2?dynamic=true&results=15&color=%2300e5ff&background=%23ffffff"></iframe>
            </div>
        </div>

        <!-- PRES -->
        <div class="card">
            <div class="label">Πίεση</div>
            <div class="value"><span id="val-pres">--</span><span class="unit">hPa</span></div>
            <div class="chart-container">
                <iframe width="100%" height="200" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/3?dynamic=true&results=15&color=%2300e5ff&background=%23ffffff"></iframe>
            </div>
        </div>
    </div>

    <div class="secondary-grid">
        <div class="small-card">
            <div class="label">Βροχόπτωση</div>
            <div class="small-value"><span id="val-rain">--</span> mm</div>
        </div>
        <div class="small-card">
            <div class="label">Μπαταρία Σταθμού</div>
            <div class="small-value"><span id="val-batt">--</span> %</div>
        </div>
    </div>

    <footer>
        Σύστημα IoT Τσαβαλακογλου &copy; 2026 | Δεδομένα από ThingSpeak API
    </footer>
</div>
