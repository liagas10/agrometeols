<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>AGRO METEO LS | High-End Dashboard</title>
    <!-- Βιβλιοθήκη για τα Ρολόγια -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/all.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid var(--accent); padding: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; color: #fff; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; max-width: 1400px; margin: auto; }
        
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; text-align: center; }
        .val { font-size: 45px; font-weight: bold; color: #fff; margin: 10px 0; }
        .unit { font-size: 18px; color: var(--accent); }
        
        canvas { margin: 15px auto; display: block; }
        
        .chart-box { background: #fff; border-radius: 8px; padding: 5px; margin-top: 15px; height: 200px; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .update-bar { background: #238636; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>AGRO METEO LS</h1>
    <div id="status" class="update-bar">ΑΝΑΜΟΝΗ ΔΕΔΟΜΕΝΩΝ...</div>
</div>

<div class="grid">
    <!-- ΘΕΡΜΟΚΡΑΣΙΑ -->
    <div class="card">
        <h3>ΘΕΡΜΟΚΡΑΣΙΑ</h3>
        <div class="val" id="t-text">--<span class="unit">°C</span></div>
        <canvas id="g-t"></canvas>
        <div class="chart-box">
            <iframe src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=20&color=%2358a6ff"></iframe>
        </div>
    </div>

    <!-- ΥΓΡΑΣΙΑ -->
    <div class="card">
        <h3>ΥΓΡΑΣΙΑ</h3>
        <div class="val" id="h-text">--<span class="unit">%</span></div>
        <canvas id="g-h"></canvas>
        <div class="chart-box">
            <iframe src="https://thingspeak.com/channels/3365350/charts/2?dynamic=true&results=20&color=%2358a6ff"></iframe>
        </div>
    </div>

    <!-- ΠΙΕΣΗ -->
    <div class="card">
        <h3>ΑΤΜΟΣΦΑΙΡΙΚΗ ΠΙΕΣΗ</h3>
        <div class="val" id="p-text">--<span class="unit">hPa</span></div>
        <canvas id="g-p"></canvas>
        <div class="chart-box">
            <iframe src="https://thingspeak.com/channels/3365350/charts/3?dynamic=true&results=20&color=%2358a6ff"></iframe>
        </div>
    </div>
</div>

<div style="text-align: center; margin-top: 30px; color: #8b949e;">
    <p>Βροχή: <span id="r-text" style="color: #fff; font-weight: bold;">--</span> mm | Μπαταρία: <span id="b-text" style="color: #fff; font-weight: bold;">--</span>%</p>
    <p>Ιδιοκτησία: Χρήστος Τσαβαλακόγλου &copy; 2026</p>
</div>

<script>
    // 1. ΔΗΜΙΟΥΡΓΙΑ ΡΟΛΟΓΙΩΝ
    const gT = new RadialGauge({ renderTo: 'g-t', width: 220, height: 220, units: '°C', minValue: -10, maxValue: 50, colorPlate: '#161b22', colorNumbers: '#fff', colorUnits: '#58a6ff', borders: false, needleType: 'arrow', animationDuration: 1500 }).draw();
    const gH = new RadialGauge({ renderTo: 'g-h', width: 220, height: 220, units: '%', minValue: 0, maxValue: 100, colorPlate: '#161b22', colorNumbers: '#fff', colorUnits: '#58a6ff', borders: false }).draw();
    const gP = new RadialGauge({ renderTo: 'g-p', width: 220, height: 220, units: 'hPa', minValue: 950, maxValue: 1050, colorPlate: '#161b22', colorNumbers: '#fff', colorUnits: '#58a6ff', borders: false }).draw();

    // 2. ΛΗΨΗ ΔΕΔΟΜΕΝΩΝ ΜΕ JSONP (Η ΜΟΝΗ ΠΟΥ ΔΟΥΛΕΥΕΙ ΠΑΝΤΑ)
    function updateUI() {
        const script = document.createElement('script');
        // Χρησιμοποιούμε το callback=displayData για να "τρυπήσουμε" το μπλοκάρισμα
        script.src = "https://api.thingspeak.com/channels/3365350/feeds/last.json?callback=displayData&_=" + new Date().getTime();
        document.body.appendChild(script);
        document.body.removeChild(script);
    }

    function displayData(data) {
        const t = parseFloat(data.field1);
        const h = parseFloat(data.field2);
        const p = parseFloat(data.field3);
        const r = parseFloat(data.field4);
        const b = parseFloat(data.field5);

        // Ενημέρωση κειμένων
        document.getElementById('t-text').innerHTML = t.toFixed(1) + '<span class="unit">°C</span>';
        document.getElementById('h-text').innerHTML = h.toFixed(0) + '<span class="unit">%</span>';
        document.getElementById('p-text').innerHTML = p.toFixed(1) + '<span class="unit">hPa</span>';
        document.getElementById('r-text').innerText = r.toFixed(2);
        document.getElementById('b-text').innerText = b.toFixed(0);

        // Ενημέρωση ρολογιών
        gT.value = t;
        gH.value = h;
        gP.value = p;

        document.getElementById('status').innerText = "LIVE: " + new Date().toLocaleTimeString();
    }

    // Εκτέλεση κάθε 20 δευτερόλεπτα
    updateUI();
    setInterval(updateUI, 20000);
</script>

</body>
</html>
