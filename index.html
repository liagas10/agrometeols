<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRO METEO LS | Field Station</title>
    
    <!-- Βιβλιοθήκη για τα Ρολόγια -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/all.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            /* Φόντο με εικόνα από χωράφι - Υψηλής ανάλυσης */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        .overlay {
            min-height: 100vh;
            backdrop-filter: blur(5px);
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        header h1 { font-size: 3rem; margin: 0; letter-spacing: 2px; }
        header p { font-size: 1.2rem; opacity: 0.9; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .card h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            color: #2d5a27;
            text-transform: uppercase;
        }

        .main-value {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 10px 0;
            color: #1a1a1a;
        }

        .unit { font-size: 1.5rem; color: #666; }

        .chart-frame {
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #ddd;
            height: 200px;
            background: white;
        }

        .status-pill {
            display: inline-block;
            background: #2d5a27;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <h1>AGRO METEO LS</h1>
        <p>Σταθμός Τσαβαλακόγλου | Παλαιός Μυλότοπος</p>
        <div class="status-pill" id="sync-status">ΣΥΝΔΕΣΗ ΜΕ ΔΟΡΥΦΟΡΟ...</div>
    </header>

    <div class="dashboard">
        <!-- ΘΕΡΜΟΚΡΑΣΙΑ -->
        <div class="card">
            <h2>Θερμοκρασία</h2>
            <div class="main-value"><span id="t-val">--</span><span class="unit">°C</span></div>
            <canvas id="gauge-t"></canvas>
            <div class="chart-frame">
                <iframe width="100%" height="100%" style="border:none" src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=15&color=%232d5a27"></iframe>
            </div>
        </div>

        <!-- ΥΓΡΑΣΙΑ -->
        <div class="card">
            <h2>Υγρασία</h2>
            <div class="main-value"><span id="h-val">--</span><span class="unit">%</span></div>
            <canvas id="gauge-h"></canvas>
            <div class="chart-frame">
                <iframe width="100%" height="100%" style="border:none" src="https://thingspeak.com/channels/3365350/charts/2?dynamic=true&results=15&color=%232d5a27"></iframe>
            </div>
        </div>

        <!-- ΠΙΕΣΗ -->
        <div class="card">
            <h2>Ατμ. Πίεση</h2>
            <div class="main-value"><span id="p-val">--</span><span class="unit">hPa</span></div>
            <canvas id="gauge-p"></canvas>
            <div class="chart-frame">
                <iframe width="100%" height="100%" style="border:none" src="https://thingspeak.com/channels/3365350/charts/3?dynamic=true&results=15&color=%232d5a27"></iframe>
            </div>
        </div>
    </div>

    <!-- ΔΕΥΤΕΡΕΥΟΝΤΑ ΣΤΟΙΧΕΙΑ -->
    <div class="dashboard" style="margin-top: 25px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
        <div class="card" style="padding: 15px;">
            <h2>Βροχόπτωση</h2>
            <div class="main-value" style="font-size: 2rem;"><span id="r-val">--</span> <span class="unit">mm</span></div>
        </div>
        <div class="card" style="padding: 15px;">
            <h2>Μπαταρία</h2>
            <div class="main-value" style="font-size: 2rem;"><span id="b-val">--</span> <span class="unit">%</span></div>
        </div>
    </div>

    <footer>
        &copy; 2026 AGRO METEO LS - Developed for Christos Tsavalakoglou
    </footer>
</div>
