<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Meteo Ls | IOT</title>
    <style>
        :root { --main-green: #2d5a27; --glass: rgba(255, 255, 255, 0.9); }
        body { 
            margin: 0; padding: 0; 
            background: #1a3317 url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }
        .overlay { min-height: 100vh; background: rgba(0,0,0,0.3); backdrop-filter: blur(3px); padding: 20px; box-sizing: border-box; position: relative; }
        
        /* ΕΠΙΚΕΦΑΛΙΔΑ - Διορθωμένη σε Agro Meteo Ls /
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { 
            margin: 0; font-size: 3.5rem; font-weight: 700;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5); letter-spacing: 1px;
        }
        header span { font-size: 0.9rem; letter-spacing: 4px; opacity: 0.9; border-top: 1px solid rgba(255,255,255,0.4); padding-top: 5px; text-transform: uppercase; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        
        .card { 
            background: var(--glass); border-radius: 20px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; flex-direction: column; 
        }
        
        / Κάρτα Σταθμού & Μπαταρία (Μικρό κουτάκι πάνω δεξιά) /
        .info-card { background: rgba(45, 90, 39, 0.95) !important; color: white !important; position: relative; }
        .batt-mini { 
            position: absolute; top: 15px; right: 15px; 
            background: rgba(255,255,255,0.15); padding: 5px 12px; 
            border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        .batt-mini div { font-size: 0.6rem; text-transform: uppercase; opacity: 0.8; }
        .batt-mini span { font-size: 1.1rem; font-weight: bold; }

        .info-line { margin: 6px 0; font-size: 0.95rem; opacity: 0.9; }
        #clock { font-size: 2.2rem; font-weight: bold; margin-top: 10px; }

        / Μετρήσεις - Πιο διακριτικές /
        .card h3 { margin: 0; font-size: 0.9rem; color: var(--main-green); text-transform: uppercase; letter-spacing: 1px; }
        .main-value { font-size: 2.2rem; font-weight: bold; margin: 5px 0; color: #111; }
        .unit { font-size: 1rem; color: #666; margin-left: 2px; }
        
        / Γραφήματα - Μεγαλύτερα /
        .chart-frame { margin-top: 10px; border-radius: 12px; overflow: hidden; height: 260px; background: white; border: 1px solid #eee; }
        iframe { width: 100%; height: 100%; border: none; }

        / IOT Tag κάτω δεξιά */
        .iot-tag { 
            position: fixed; bottom: 20px; right: 20px; 
            background: rgba(0,0,0,0.7); color: #4caf50; 
            padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; 
            border: 1px solid #4caf50; font-weight: bold; display: flex; align-items: center; gap: 8px;
        }
        .dot { width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        footer { text-align: center; color: white; margin-top: 40px; padding: 20px; font-size: 0.85rem; opacity: 0.6; }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <h1>Agro Meteo Ls</h1>
        <span>Precision Agriculture System</span>
    </header>

    <div class="dashboard">
        <!-- ΚΑΡΤΑ ΠΛΗΡΟΦΟΡΙΩΝ -->
        <div class="card info-card">
            <div class="batt-mini">
                <div>BATTERY</div>
                <span id="b-val">--</span><small>%</small>
                <div id="b-label" style="font-size: 0.55rem; font-weight:bold;">--</div>
            </div>
            <h3 style="color:white; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom:8px; margin-bottom:10px;">ΣΤΑΘΜΟΣ</h3>
            <div class="info-line"><strong>Ιδιοκτήτης:</strong> Χ. Τσαβαλακόγλου</div>
            <div class="info-line"><strong>Υψόμετρο:</strong> 40m</div>
            <div id="clock">--:--:--</div>
            <div id="date" style="opacity:0.8">------</div>
        </div>

        <!-- ΘΕΡΜΟΚΡΑΣΙΑ -->
        <div class="card">
            <h3>Θερμοκρασία</h3>
            <div class="main-value"><span id="t-val">--</span><span class="unit">°C</span></div>
            <div class="chart-frame">
                <iframe src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=25&color=%232d5a27&type=line"></iframe>
            </div>
        </div>

        <!-- ΥΓΡΑΣΙΑ -->
        <div class="card">
            <h3>Υγρασία</h3>
            <div class="main-value"><span id="h-val">--</span><span class="unit">%</span></div>
            <div class="chart-frame">
                <iframe src="https://thingspeak.com/channels/3365350/charts/2?dynamic=true&results=25&color=%232d5a27&type=line"></iframe>
            </div>
        </div>

        <!-- ΠΙΕΣΗ -->
        <div class="card">
            <h3>Ατμοσφαιρική Πίεση</h3>
            <div class="main-value"><span id="p-val">--</span><span class="unit">hPa</span></div>
            <div class="chart-frame">
                <iframe src="https://thingspeak.com/channels/3365350/charts/3?dynamic=true&results=25&color=%232d5a27&type=line"></iframe>
            </div>
        </div>

        <!-- ΒΡΟΧΟΠΤΩΣΗ -->
        <div class="card">
            <h3>Βροχόπτωση (24h)</h3>
            <div class="main-value"><span id="r-val">--</span><span class="unit">mm</span></div>
            <div class="chart-frame">
                <iframe src="https://thingspeak.com/channels/3365350/charts/4?dynamic=true&results=25&color=%232d5a27&type=column"></iframe>
            </div>
        </div>
    </div>

    <div class="iot-tag">
        <div class="dot"></div> IOT SYSTEM ACTIVE
    </div>

    <footer>
        &copy; 2026 Agro Meteo Ls | IOT Precision Farming
    </footer>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('el-GR');
        document.getElementById('date').innerText = now.toLocaleDateString('el-GR', {weekday:'long', day:'numeric', month:'long'});
    }
    setInterval(updateTime, 1000);
    updateTime();
