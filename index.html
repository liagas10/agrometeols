<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRO METEO LS | Professional Station</title>
    
    <!-- Google Fonts για Pro εμφάνιση -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
    
    <!-- Βιβλιοθήκη για τα Ρολόγια -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-gauges@2.1.7/all.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-color: #00d4ff;
            --text-color: #e6edf3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 10px;
        }

        .main-header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, #161b22 0%, #0b0e14 100%);
            border-bottom: 2px solid var(--accent-color);
            margin-bottom: 25px;
        }

        .main-header h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 3px;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .status-bar {
            font-size: 0.9em;
            color: #8b949e;
            margin-top: 10px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: auto;
        }

        .sensor-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #30363d;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .sensor-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .value-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5em;
            font-weight: bold;
            margin: 15px 0;
            color: #fff;
        }

        .unit { font-size: 0.4em; color: var(--accent-color); margin-left: 5px; }

        .chart-box {
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #30363d;
            height: 200px;
        }

        .label {
            font-weight: 500;
            text-transform: uppercase;
            color: #8b949e;
            letter-spacing: 1px;
            font-size: 0.85em;
        }

        .footer {
            text-align: center;
            padding: 40px;
            color: #484f58;
            font-size: 0.8em;
        }

        #sync-dot {
            height: 10px; width: 10px; background-color: #238636;
            border-radius: 50%; display: inline-block; margin-right: 5px;
            box-shadow: 0 0 8px #238636;
        }
    </style>
</head>
<body>

<div class="main-header">
    <h1>AGRO METEO LS</h1>
    <div class="status-bar">
        <span id="sync-dot"></span> 
        ΣΤΑΘΜΟΣ: ΠΑΛΑΙΟΣ ΜΥΛΟΤΟΠΟΣ | ΕΝΗΜΕΡΩΣΗ: <span id="time-update">--:--:--</span>
    </div>
</div>

<div class="dashboard-grid">
    
    <!-- ΘΕΡΜΟΚΡΑΣΙΑ -->
    <div class="sensor-card">
        <span class="label">Θερμοκρασία</span>
        <div class="value-display" id="temp-val">--<span class="unit">°C</span></div>
        <canvas id="gauge-temp"></canvas>
        <div class="chart-box">
            <iframe width="100%" height="100%" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=20&color=%2300d4ff&bgcolor=%23161b22"></iframe>
        </div>
    </div>

    <!-- ΥΓΡΑΣΙΑ -->
    <div class="sensor-card">
        <span class="label">Υγρασία</span>
        <div class="value-display" id="hum-val">--<span class="unit">%</span></div>
        <canvas id="gauge-hum"></canvas>
        <div class="chart-box">
            <iframe width="100%" height="100%" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/2?dynamic=true&results=20&color=%2300d4ff&bgcolor=%23161b22"></iframe>
        </div>
    </div>

    <!-- ΠΙΕΣΗ -->
    <div class="sensor-card">
        <span class="label">Ατμοσφαιρική Πίεση</span>
        <div class="value-display" id="pres-val">--<span class="unit">hPa</span></div>
        <canvas id="gauge-pres"></canvas>
        <div class="chart-box">
            <iframe width="100%" height="100%" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/3?dynamic=true&results=20&color=%2300d4ff&bgcolor=%23161b22"></iframe>
        </div>
    </div>

    <!-- ΒΡΟΧΗ & ΜΠΑΤΑΡΙΑ (Compact) -->
    <div class="sensor-card">
        <span class="label">Βροχόπτωση (24h)</span>
        <div class="value-display" id="rain-val" style="color: #2ea043;">--<span class="unit">mm</span></div>
        <hr style="border: 0; border-top: 1px solid #30363d; margin: 20px 0;">
        <span class="label">Στάθμη Μπαταρίας</span>
        <div class="value-display" id="batt-val" style="font-size: 1.8em;">--<span class="unit">%</span></div>
    </div>

</div>

<div class="footer">
    Ιδιοκτήτης: Χρήστος Τσαβαλακόγλου &copy; 2026 | Powered by ThingSpeak API
</div>
