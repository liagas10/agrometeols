<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Meteo LS - Professional Portal</title>
    <!-- Google Gauges API -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <!-- Font Awesome για εικονίδια -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; color: #333; }
        header { background: linear-gradient(135deg, #1a4a7a 0%, #0d2a4a 100%); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .container { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; max-width: 1400px; margin: auto; }
        
        /* Sidebar Style - Εμπνευσμένο από Στράβων /
        .sidebar { width: 340px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #d1d9e6; }
        .sidebar-title { background: #7b8d43; color: white; padding: 12px; font-weight: bold; font-size: 1.1em; display: flex; align-items: center; gap: 10px; }
        .data-list { list-style: none; margin: 0; padding: 0; }
        .data-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; transition: background 0.3s; }
        .data-item:hover { background: #f9f9f9; }
        .data-label { color: #666; font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .data-label i { width: 20px; color: #1a4a7a; }
        .data-value { color: #0044cc; font-weight: bold; font-size: 1.1em; }

        / Gauges & Charts */
        .dashboard { flex: 1; min-width: 350px; display: flex; flex-direction: column; gap: 20px; }
        .gauges-row { display: flex; justify-content: space-around; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .chart-card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #1a4a7a; }
        .chart-header { text-align: center; font-weight: bold; padding: 5px; color: #555; border-bottom: 1px solid #eee; margin-bottom: 10px; }

        @media (max-width: 768px) { .sidebar { width: 100%; } .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;"><i class="fa-solid fa-cloud-sun-rain"></i> AGRO METEO LS</h1>
    <p style="margin:5px 0 0 0; opacity: 0.8;">Live Μετεωρολογικά Δεδομένα</p>
</header>

<div class="container">
    <!-- ΑΡΙΣΤΕΡΗ ΣΤΗΛΗ: ΠΙΝΑΚΑΣ -->
    <div class="sidebar">
        <div class="sidebar-title"><i class="fa-solid fa-list-check"></i> Τρέχουσες Μετρήσεις</div>
        <div class="data-list">
            <div class="data-item">
                <span class="data-label"><i class="fa-solid fa-temperature-half"></i> Θερμοκρασία</span>
                <span class="data-value" id="temp">-- °C</span>
            </div>
            <div class="data-item">
                <span class="data-label"><i class="fa-solid fa-droplet"></i> Υγρασία</span>
                <span class="data-value" id="hum">-- %</span>
            </div>
            <div class="data-item">
                <span class="data-label"><i class="fa-solid fa-gauge-high"></i> Πίεση</span>
                <span class="data-value" id="pres">-- hPa</span>
            </div>
            <div class="data-item">
                <span class="data-label"><i class="fa-solid fa-cloud-showers-heavy"></i> Βροχόπτωση</span>
                <span class="data-value" id="rain">-- mm</span>
            </div>
            <div class="data-item">
                <span class="data-label"><i class="fa-solid fa-battery-three-quarters"></i> Μπαταρία</span>
                <span class="data-value" id="batt">-- %</span>
            </div>
            <div class="data-item" style="background:#fcfcfc;">
                <span class="data-label"><i class="fa-solid fa-clock"></i> Τελ. Ενημέρωση</span>
                <span id="time" style="font-size:0.9em; color:#999;">--:--:--</span>
            </div>
        </div>
    </div>

    <!-- ΔΕΞΙΑ ΣΤΗΛΗ: GAUGES & CHARTS -->
    <div class="dashboard">
        <!-- ΡΟΛΟΓΙΑ (GAUGES) -->
        <div class="gauges-row">
            <div id="gauge_temp"></div>
            <div id="gauge_hum"></div>
        </div>

        <!-- ΓΡΑΦΗΜΑΤΑ -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-header">Ιστορικό Θερμοκρασίας</div>
                <iframe width="100%" height="250" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&type=line"></iframe>
            </div>
            <div class="chart-card">
                <div class="chart-header">Ιστορικό Βροχόπτωσης</div>
                <iframe width="100%" height="250" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/4?bgcolor=%23ffffff&color=%232980b9&dynamic=true&results=60&type=bar"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['gauge']});
    google.charts.setOnLoadCallback(drawGauges);

    let gaugeData, gaugeOptions, chartTemp, chartHum;

    function drawGauges() {
        gaugeData = google.visualization.arrayToDataTable([
            ['Label', 'Value'],
            ['Temp', 0],
            ['Hum', 0]
        ]);

        gaugeOptions = {
            width: 400, height: 160,
            redFrom: 35, redTo: 50,
            yellowFrom: 30, yellowTo: 35,
            minorTicks: 5
        };

        chartTemp = new google.visualization.Gauge(document.getElementById('gauge_temp'));
        chartHum = new google.visualization.Gauge(document.getElementById('gauge_hum'));

        updateData();
    }

    async function updateData() {
        try {
            const response = await fetch('https://api.thingspeak.com/channels/3365350/feeds/last.json');
            const data = await response.json();
            
            const t = parseFloat(data.field1);
            const h = parseFloat(data.field2);
            const p = parseFloat(data.field3);
            const r = parseFloat(data.field4);
            const b = parseFloat(data.field5);

            // Ενημέρωση Πίνακα
            document.getElementById('temp').innerText = t.toFixed(1) + " °C";
            document.getElementById('hum').innerText = h.toFixed(0) + " %";
            document.getElementById('pres').innerText = p.toFixed(1) + " hPa";
            document.getElementById('rain').innerText = r.toFixed(2) + " mm";
