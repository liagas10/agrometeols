<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRO METEO LS | CONTROL CENTER</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --accent: #00ff88; /* Πράσινο νέον /
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Orbitron', sans-serif; / Αν δεν φορτώσει, πάει σε sans-serif /
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: auto; }

        / HEADER - CYBER STYLE /
        header {
            border-left: 10px solid var(--accent);
            padding: 20px;
            background: var(--card);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .title-block h1 { margin: 0; font-size: 32px; letter-spacing: 2px; }
        .live-indicator { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--accent); }
        .dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: blink 1.5s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        / GRID SYSTEM /
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        / CARD STYLE /
        .card {
            background: var(--card);
            border: 1px solid #222;
            padding: 20px;
            border-radius: 5px;
            position: relative;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); }

        .card-label { color: #666; text-transform: uppercase; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: block; }
        .card-value { font-size: 48px; font-weight: bold; color: #fff; margin-bottom: 15px; }
        .unit { font-size: 20px; color: var(--accent); margin-left: 5px; }

        / BAR GAUGES /
        .bar-bg { background: #222; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        .bar-fill { background: var(--accent); height: 100%; width: 0%; transition: 1s ease-in-out; }

        / CHART EMBED /
        .chart-wrap { background: #fff; border-radius: 4px; padding: 5px; height: 200px; }
        iframe { width: 100%; height: 100%; border: none; }

        / FOOTER INFO */
        .info-strip {
            margin-top: 30px;
            padding: 15px;
            background: #111;
            font-size: 13px;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="title-block">
            <h1>AGRO METEO LS</h1>
            <div style="color: #444;">Π. ΜΥΛΟΤΟΠΟΣ | SENSOR NETWORK v3.0</div>
        </div>
        <div class="live-indicator">
            <div class="dot"></div>
            <span id="update-time">INITIALIZING...</span>
        </div>
    </header>

    <div class="main-grid">
        <!-- ΘΕΡΜΟΚΡΑΣΙΑ -->
        <div class="card">
            <span class="card-label">Θερμοκρασία Περιβάλλοντος</span>
            <div class="card-value"><span id="val-t">--</span><span class="unit">°C</span></div>
            <div class="bar-bg"><div id="bar-t" class="bar-fill"></div></div>
            <div class="chart-wrap">
                <iframe src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=20&type=line&color=%2300ff88&bgcolor=%23ffffff"></iframe>
            </div>
        </div>

        <!-- ΥΓΡΑΣΙΑ -->
        <div class="card">
            <span class="card-label">Σχετική Υγρασία</span>
            <div class="card-value"><span id="val-h">--</span><span class="unit">%</span></div>
            <div class="bar-bg"><div id="bar-h" class="bar-fill" style="background: #00d2ff;"></div></div>
            <div class="chart-wrap">
                <iframe src="https://thingspeak.com/channels/3365350/charts/2?dynamic=true&results=20&type=line&color=%2300d2ff&bgcolor=%23ffffff"></iframe>
            </div>
        </div>

        <!-- ΠΙΕΣΗ -->
        <div class="card">
            <span class="card-label">Ατμοσφαιρική Πίεση</span>
            <div class="card-value"><span id="val-p">--</span><span class="unit">hPa</span></div>
            <div class="bar-bg"><div id="bar-p" class="bar-fill" style="background: #ffcc00;"></div></div>
            <div class="chart-wrap">
                <iframe src="https://thingspeak.com/channels/3365350/charts/3?dynamic=true&results=20&type=line&color=%23ffcc00&bgcolor=%23ffffff"></iframe>
            </div>
        </div>

        <!-- ΒΡΟΧΗ -->
        <div class="card">
            <span class="card-label">Βροχόπτωση (24h)</span>
            <div class="card-value"><span id="val-r">--</span><span class="unit">mm</span></div>
            <div class="bar-bg"><div id="bar-r" class="bar-fill" style="background: #ff0055;"></div></div>
            <div class="chart-wrap">
                <iframe src="https://thingspeak.com/channels/3365350/charts/4?dynamic=true&results=20&type=column&color=%23ff0055&bgcolor=%23ffffff"></iframe>
            </div>
        </div>
    </div>

    <div class="info-strip">
        <span>Ιδιοκτήτης: Χρήστος Τσαβαλακόγλου</span>
        <span>Σύστημα: Arduino Cloud / ThingSpeak API</span>
        <span id="batt-info">Battery: --%</span>
    </div>
</div>

<script>
    function updateDashboard() {
        // Χρησιμοποιούμε AJAX με JSONP για να παρακάμψουμε το CORS του GitHub
        $.ajax({
            url: "https://api.thingspeak.com/channels/3365350/feeds/last.json",
            dataType: "jsonp",
            success: function(data) {
                if(data) {
                    const t = parseFloat(data.field1);
                    const h = parseFloat(data.field2);
                    const p = parseFloat(data.field3);
                    const r = parseFloat(data.field4);
                    const b = parseFloat(data.field5);

                    // Ενημέρωση Τιμών
                    $('#val-t').text(t.toFixed(1));
                    $('#val-h').text(h.toFixed(0));
                    $('#val-p').text(p.toFixed(1));
                    $('#val-r').text(r.toFixed(2));
                    $('#batt-info').text("Battery: " + b.toFixed(0) + "%");

                    // Ενημέρωση Bars (Ποσοστά για το animation)
                    $('#bar-t').css('width', ((t + 10) * 1.6) + '%'); // -10 έως 50 βαθμούς
                    $('#bar-h').css('width', h + '%')
