<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>AGRO METEO LS</title>
    <style>
        body { margin: 0; padding: 0; background: #2d5a27 url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; background-size: cover; font-family: sans-serif; }
        .overlay { min-height: 100vh; backdrop-filter: blur(5px); background: rgba(0,0,0,0.2); padding: 20px; }
        header { text-align: center; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; }
        .card { background: rgba(255,255,255,0.9); border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); overflow: hidden; }
        .info-card { background: #2d5a27 !important; color: white; text-align: left !important; }
        
        /* Το μυστικό: Iframes για τους αριθμούς */
        .value-frame { width: 100%; height: 80px; border: none; margin: 5px 0; pointer-events: none; }
        .chart-frame { width: 100%; height: 200px; border: none; margin-top: 10px; background: white; border-radius: 10px; }
        
        #clock { font-size: 2.2rem; font-weight: bold; margin-top: 15px; }
        #date { font-size: 1.1rem; opacity: 0.9; }
    </style>
</head>
<body>
<div class="overlay">
    <header><h1>AGRO METEO LS</h1></header>
    <div class="dashboard">
        
        <!-- ΚΑΡΤΑ ΠΛΗΡΟΦΟΡΙΩΝ -->
        <div class="card info-card">
            <h3 style="margin-top:0">ΣΤΟΙΧΕΙΑ ΣΤΑΘΜΟΥ</h3>
            <p style="margin: 5px 0;"><strong>Σταθμός:</strong> Agro Meteo Ls</p>
            <p style="margin: 5px 0;"><strong>Ιδιοκτησία:</strong> Χρήστος Τσαβαλακόγλου</p>
            <p style="margin: 5px 0;"><strong>Υψόμετρο:</strong> 40m</p>
            <p style="margin: 5px 0;"><strong>Φιλοξενία:</strong> Τσαβαλακόγλου</p>
            <div id="clock"></div>
            <div id="date"></div>
        </div>

        <!-- ΘΕΡΜΟΚΡΑΣΙΑ -->
        <div class="card">
            <h3>ΘΕΡΜΟΚΡΑΣΙΑ</h3>
            <iframe class="value-frame" src="https://thingspeak.com/channels/3365350/widgets/1004140"></iframe>
            <iframe class="chart-frame" src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=15&color=%232d5a27"></iframe>
        </div>

        <!-- ΥΓΡΑΣΙΑ -->
        <div class="card">
            <h3>ΥΓΡΑΣΙΑ</h3>
            <iframe class="value-frame" src="https://thingspeak.com/channels/3365350/widgets/1004141"></iframe>
            <iframe class="chart-frame" src="https://thingspeak.com/channels/3365350/charts/2?dynamic=true&results=15&color=%232d5a27"></iframe>
        </div>

        <!-- ΠΙΕΣΗ -->
        <div class="card">
            <h3>ΠΙΕΣΗ</h3>
            <iframe class="value-frame" src="https://thingspeak.com/channels/3365350/widgets/1004142"></iframe>
            <iframe class="chart-frame" src="https://thingspeak.com/channels/3365350/charts/3?dynamic=true&results=15&color=%232d5a27"></iframe>
        </div>

        <!-- ΒΡΟΧΟΠΤΩΣΗ -->
        <div class="card">
            <h3>ΒΡΟΧΟΠΤΩΣΗ (24h)</h3>
            <iframe class="value-frame" src="https://thingspeak.com/channels/3365350/widgets/1004143"></iframe>
            <p style="color: #666; font-size: 0.9rem;">Συνολική μέτρηση ημέρας</p>
        </div>

        <!-- ΜΠΑΤΑΡΙΑ -->
        <div class="card">
            <h3>ΣΤΑΘΜΗ ΜΠΑΤΑΡΙΑΣ</h3>
            <iframe class="value-frame" src="https://thingspeak.com/channels/3365350/widgets/1004144"></iframe>
            <p style="color: #666; font-size: 0.9rem;">Τάση συστήματος %</p>
        </div>

    </div>
</div>

<script>
    function updateTime() {
        const τ = new Date();
        document.getElementById('clock').innerHTML = τ.toLocaleTimeString('el-GR');
        document.getElementById('date').innerHTML = τ.toLocaleDateString('el-GR', {weekday:'long', day:'numeric', month:'long'});
    }
    setInterval(updateTime, 1000);
    updateTime();
</script>
</body>
</html>
