<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Agro Meteo LS | Pro Station</title>
    <!-- Βιβλιοθήκη για τα Ρολόγια -->
    <script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/gh-pages/download/2.1.7/all/gauge.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .dashboard { max-width: 1200px; margin: auto; display: flex; flex-wrap: wrap; gap: 20px; }
        
        /* HEADER /
        .main-header { width: 100%; background: #1e1e1e; padding: 20px; border-left: 5px solid #ff4757; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        
        / ΑΡΙΣΤΕΡΗ ΣΤΗΛΗ /
        .side-panel { width: 300px; background: #1e1e1e; border-radius: 5px; overflow: hidden; height: fit-content; }
        .side-header { background: #ff4757; padding: 15px; font-weight: bold; text-align: center; letter-spacing: 1px; }
        .data-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; font-size: 15px; }
        .data-row:last-child { border-bottom: none; }
        .label { color: #aaa; }
        .value { color: #ff4757; font-weight: bold; }

        / ΚΕΝΤΡΙΚΗ ΣΤΗΛΗ /
        .main-panel { flex: 1; min-width: 350px; display: flex; flex-direction: column; gap: 20px; }
        
        / ΡΟΛΟΓΙΑ /
        .gauge-flex { display: flex; justify-content: space-around; background: #1e1e1e; padding: 20px; border-radius: 5px; flex-wrap: wrap; gap: 10px; }
        .gauge-item { text-align: center; }
        .gauge-title { margin-top: 10px; font-size: 12px; color: #888; text-transform: uppercase; }

        / ΓΡΑΦΗΜΑΤΑ */
        .charts-box { background: #1e1e1e; padding: 15px; border-radius: 5px; }
        .chart-frame { background: #fff; border-radius: 5px; padding: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="dashboard">
    <header class="main-header">
        <div>
            <h1 style="margin:0; font-size: 24px;">AGRO METEO LS</h1>
            <span style="color: #888;">Παλαιός Μυλότοπος Πέλλας | Τσαβαλακογλου Χρήστος</span>
        </div>
        <div id="update-time" style="font-size: 12px; color: #ff4757;">Σύνδεση...</div>
    </header>

    <!-- ΑΡΙΣΤΕΡΗ ΣΤΗΛΗ -->
    <div class="side-panel">
        <div class="side-header">ΣΤΑΘΜΟΣ LIVE</div>
        <div class="data-row"><span class="label">Θερμοκρασία</span><span class="value" id="v-t">--</span></div>
        <div class="data-row"><span class="label">Υγρασία</span><span class="value" id="v-h">--</span></div>
        <div class="data-row"><span class="label">Βαρόμετρο</span><span class="value" id="v-p">--</span></div>
        <div class="data-row"><span class="label">Σημείο Δρόσου</span><span class="value" id="v-d">--</span></div>
        <div class="data-row"><span class="label">Βροχή (24h)</span><span class="value" id="v-r" style="color:#2ed573">--</span></div>
        <div class="data-row"><span class="label">Μπαταρία</span><span class="value" id="v-b" style="color:#ffa502">--</span></div>
    </div>

    <!-- ΚΕΝΤΡΙΚΗ ΣΤΗΛΗ -->
    <div class="main-panel">
        <!-- ΤΑ ΡΟΛΟΓΙΑ ΣΟΥ -->
        <div class="gauge-flex">
            <div class="gauge-item">
                <canvas id="gauge-temp"></canvas>
                <div class="gauge-title">Θερμοκρασία</div>
            </div>
            <div class="gauge-item">
                <canvas id="gauge-hum"></canvas>
                <div class="gauge-title">Υγρασία</div>
            </div>
            <div class="gauge-item">
                <canvas id="gauge-pres"></canvas>
                <div class="gauge-title">Πίεση</div>
            </div>
        </div>

        <!-- ΓΡΑΦΗΜΑΤΑ -->
        <div class="charts-box">
            <div class="chart-frame">
                <iframe width="100%" height="250" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=60&type=line&color=%23ff4757"></iframe>
            </div>
            <div class="chart-frame">
                <iframe width="100%" height="250" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/4?dynamic=true&results=60&type=column"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    // ΡΥΘΜΙΣΗ ΡΟΛΟΓΙΩΝ
    var gTemp = new RadialGauge({ renderTo: 'gauge-temp', width: 180, height: 180, units: '°C', minValue: -10, maxValue: 50, majorTicks: ['-10','0','10','20','30','40','50'], colorPlate: '#1e1e1e', colorUnits: '#ccc', colorNumbers: '#eee', needleType: 'arrow', needleWidth: 3, borders: false, barWidth: 10, highlights: [{from: 35, to: 50, color: 'rgba(255,0,0,.3)'}] }).draw();
    var gHum = new RadialGauge({ renderTo: 'gauge-hum', width: 180, height: 180, units: '%', minValue: 0, maxValue: 100, majorTicks: ['0','20','40','60','80','100'], colorPlate: '#1e1e1e', colorUnits: '#ccc', colorNumbers: '#eee', needleType: 'arrow', needleWidth: 3, borders: false, barWidth: 10, colorTitle: '#3498db' }).draw();
    var gPres = new RadialGauge({ renderTo: 'gauge-pres', width: 180, height: 180, units: 'hPa', minValue: 950, maxValue: 1050, majorTicks: ['950','975','1000','1025','1050'], colorPlate: '#1e1e1e', colorUnits: '#ccc', colorNumbers: '#eee', needleType: 'arrow', needleWidth: 3, borders: false, barWidth: 10 }).draw();

    function update() {
        $.getJSON('https://api.thingspeak.com/channels/3365350/feeds/last.json?callback=?', function(data) {
            if(data) {
                var t = parseFloat(data.field1);
                var h = parseFloat(data.field2);
                var p = parseFloat(data.field3);
                var r = parseFloat(data.field4);
                var b = parseFloat(data.field5);
                var d = (t - ((100 - h) / 5)).toFixed(1);

                // Ενημέρωση Ρολογιών
                gTemp.value = t;
                gHum.value = h;
                gPres.value = p;

                // Ενημέρωση Πίνακα
                $('#v-t').text(t.toFixed(1) + " °C");
                $('#v-h').text(h.toFixed(0) + " %");
                $('#v-p').text(p.toFixed(1) + " hPa");
                $('#v-d').text(d + " °C");
                $('#v-r').text(r.toFixed(2) + " mm");
                $('#v-b').text(b.toFixed(0) + " %");
                $('#update-time').text("Live: " + new Date(data.created_at).toLocaleTimeString('el-GR'));
            }
        });
    }

    update();
    setInterval(update, 20000);
</script>

</body>
</html>
