<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Agro Meteo LS | Pro Dashboard</title>
    <script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/gh-pages/download/2.1.7/all/gauge.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: auto; }

        /* HEADER /
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 25px;
        }

        .logo h1 { margin: 0; font-size: 24px; letter-spacing: 1px; color: var(--accent); }
        .status-pill { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid #10b981; }

        / GRID SYSTEM /
        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
        }

        / LEFT PANEL /
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .stat-label { color: var(--text-dim); font-size: 14px; font-weight: 500; }
        .stat-value { font-size: 20px; font-weight: 700; color: #fff; }

        / RIGHT PANEL /
        .main-content { display: flex; flex-direction: column; gap: 25px; }

        .gauges-wrapper {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .chart-box {
            background: #fff; / Λευκό για να φαίνονται καθαρά τα charts του ThingSpeak */
            padding: 10px;
            border-radius: 15px;
            overflow: hidden;
        }

        .chart-label { color: var(--text-main); margin-bottom: 10px; font-weight: bold; padding-left: 5px; }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">
            <h1>AGRO METEO LS</h1>
            <div style="font-size: 12px; color: var(--text-dim);">Παλαιός Μυλότοπος • Χρήστος Τσαβαλακογλου</div>
        </div>
        <div id="sync-time" class="status-pill">ΣΥΝΔΕΣΗ...</div>
    </header>

    <div class="dashboard-grid">
        <!-- ΑΡΙΣΤΕΡΕΣ ΜΕΤΡΗΣΕΙΣ -->
        <div class="sidebar">
            <div class="stat-card">
                <span class="stat-label">Θερμοκρασία</span>
                <span class="stat-value" id="t-txt">--°C</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Υγρασία</span>
                <span class="stat-value" id="h-txt" style="color: #38bdf8;">--%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Βαρόμετρο</span>
                <span class="stat-value" id="p-txt" style="color: #fbbf24;">--</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Σημείο Δρόσου</span>
                <span class="stat-value" id="d-txt">--</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Βροχόπτωση</span>
                <span class="stat-value" id="r-txt" style="color: #4ade80;">--</span>
            </div>
            <div class="stat-card" style="border-bottom: 4px solid #f87171;">
                <span class="stat-label">Μπαταρία</span>
                <span class="stat-value" id="b-txt">--</span>
            </div>
        </div>

        <!-- ΚΕΝΤΡΙΚΟ ΠΑΝΕΛ -->
        <div class="main-content">
            <!-- ΡΟΛΟΓΙΑ -->
            <div class="gauges-wrapper">
                <canvas id="gauge-temp"></canvas>
                <canvas id="gauge-hum"></canvas>
                <canvas id="gauge-baro"></canvas>
            </div>

            <!-- ΓΡΑΦΗΜΑΤΑ -->
            <div class="chart-label">Ανάλυση Τελευταίων 24 Ωρών</div>
            <div class="chart-box">
                <iframe width="100%" height="260" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=60&type=line&color=%2338bdf8"></iframe>
            </div>
            <div class="chart-box">
                <iframe width="100%" height="260" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/4?dynamic=true&results=60&type=column&color=%234ade80"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    // ΔΗΜΙΟΥΡΓΙΑ ΟΡΓΑΝΩΝ ΜΕ ΧΡΩΜΑΤΑ
    const gT = new RadialGauge({
        renderTo: 'gauge-temp', width: 220, height: 220, units: '°C', title: 'TEMP',
        minValue: -10, maxValue: 50,
        colorPlate: '#1e293b', colorTitle: '#fff', colorUnits: '#ccc', colorNumbers: '#eee',
        majorTicks: ['-10','0','10','20','30','40','50'],
        highlights: [{from: -10, to: 0, color: 'rgba(0,0,255,.3)'}, {from: 35, to: 50, color: 'rgba(255,0,0,.3)'}],
        needleType: 'arrow', needleWidth: 2, borders: false, barWidth: 5, animationRule: 'bounce'
    }).draw();

    const gH = new RadialGauge({
        renderTo: 'gauge-hum', width: 220, height: 220, units: '%', title: 'HUMIDITY',
        minValue: 0, maxValue: 100,
        colorPlate: '#1e293b', colorTitle: '#fff', colorUnits: '#ccc', colorNumbers: '#eee',
        majorTicks: ['0','20','40','60','80','100'],
        highlights: [{from: 70, to: 100, color: 'rgba(56,189,248,.3)'}],
        needleType: 'arrow', needleWidth: 2, borders: false, barWidth: 5
    }).draw();

        minValue: 950, maxValue: 1050,
        colorPlate: '#1e293b', colorTitle: '#fff', colorUnits: '#ccc', colorNumbers: '#eee',
