<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Agro Meteo LS | Pro Edition</title>
    <!-- Βιβλιοθήκες για τα Ρολόγια -->
    <script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/gh-pages/download/2.1.7/all/gauge.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard-wrapper {
            max-width: 1300px;
            margin: auto;
        }

        /* HEADER /
        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .station-info h1 { margin: 0; font-size: 28px; color: #38bdf8; text-transform: uppercase; }
        .update-tag { background: #10b981; color: white; padding: 6px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; }

        / GRID LAYOUT /
        .grid-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        / SIDEBAR STATS /
        .stats-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .stats-header { background: rgba(56, 189, 248, 0.2); padding: 20px; text-align: center; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .stat-label { color: #94a3b8; font-weight: 500; }
        .stat-value { font-weight: 700; font-size: 1.2rem; color: #fff; }

        / MAIN CONTENT (GAUGES & CHARTS) /
        .main-display { display: flex; flex-direction: column; gap: 25px; }

        .gauges-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-card {
            background: #ffffff; / Λευκό για τα γραφήματα */
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @media (max-width: 950px) {
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <header>
        <div class="station-info">
            <h1>AGRO METEO LS</h1>
            <div style="color: #94a3b8; margin-top: 5px;">Παλαιός Μυλότοπος • Ιδιοκτησία: Χ. Τσαβαλακογλου</div>
        </div>
        <div id="last-sync" class="update-tag">ΑΝΑΖΗΤΗΣΗ...</div>
    </header>

    <div class="grid-container">
        <!-- SIDEBAR -->
        <div class="stats-panel">
            <div class="stats-header">ΤΡΕΧΟΥΣΕΣ ΜΕΤΡΗΣΕΙΣ</div>
            <div class="stat-item">
                <span class="stat-label">Θερμοκρασία</span>
                <span class="stat-value" id="t-val">--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Υγρασία</span>
                <span class="stat-value" id="h-val" style="color: #38bdf8;">--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Πίεση</span>
                <span class="stat-value" id="p-val" style="color: #fbbf24;">--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Σημείο Δρόσου</span>
                <span class="stat-value" id="d-val">--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Βροχόπτωση</span>
                <span class="stat-value" id="r-val" style="color: #22c55e;">--</span>
            </div>
            <div class="stat-item" style="border-top: 2px solid #ef4444;">
                <span class="stat-label">Μπαταρία</span>
                <span class="stat-value" id="b-val">--</span>
            </div>
        </div>

        <!-- GAUGES & CHARTS -->
        <div class="main-display">
            <div class="gauges-card">
                <canvas id="gauge-temp"></canvas>
                <canvas id="gauge-hum"></canvas>
                <canvas id="gauge-pres"></canvas>
            </div>

            <div class="chart-card">
                <iframe width="100%" height="260" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/1?dynamic=true&results=60&type=line&color=%2338bdf8"></iframe>
            </div>
            
            <div class="chart-card">
                <iframe width="100%" height="260" style="border:none;" src="https://thingspeak.com/channels/3365350/charts/4?dynamic=true&results=60&type=column&color=%2322c55e"></iframe>
            </div>
        </div>
    </div>
</div>
