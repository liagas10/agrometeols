<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Agro Meteo Check</title>
</head>
<body style="background:#222; color:white; font-family:sans-serif; text-align:center;">
    <h1>Έλεγχος Δεδομένων</h1>
    <div style="font-size:20px; margin:20px;">
        Θερμοκρασία: <span id="temp">--</span>°C<br>
        Υγρασία: <span id="hum">--</span>%<br>
        Ρολόι: <span id="clock">--</span>
    </div>

    <script>
        function update() {
            // Ρολόι για να ξέρουμε ότι το Script τρέχει
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();

            // Λήψη δεδομένων
            fetch("https://api.thingspeak.com/channels/3365350/feeds.json?results=1")
            .then(res => res.json())
            .then(data => {
                var last = data.feeds[0];
                document.getElementById('temp').innerText = last.field1;
                document.getElementById('hum').innerText = last.field2;
                console.log("Δεδομένα ήρθαν!");
            })
            .catch(err => {
                document.getElementById('temp').innerText = "Σφάλμα!";
                console.log(err);
            });
        }
        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
